<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Haze</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f6f3ff;
}

header{
  background:#a78bfa;
  color:white;
  padding:20px;
  text-align:center;
  font-size:26px;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  padding:10px;
  background:#a78bfa;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.toolbar button{
  background:#ddd;
  color:black;
  margin-right:5px;
}

img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Story Haze 💜</header>

<div class="container">

<h3>Login</h3>
<input id="user" placeholder="Nama kamu...">
<button onclick="login()">Masuk</button>

<div id="app" style="display:none;">

<h3>Tulis Cerita</h3>

<div class="toolbar">
<button onclick="format('b')">Bold</button>
<button onclick="format('i')">Italic</button>
</div>

<input id="judul" placeholder="Judul cerita...">
<textarea id="isi" placeholder="Tulis ceritamu..."></textarea>
<input type="file" id="gambar">

<button onclick="tambah()">Publish</button>

<input id="search" placeholder="Cari..." oninput="tampil()">

<div id="posts"></div>

</div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem('storyhaze') || "[]");
let username = localStorage.getItem('user') || "";

if(username){
  document.getElementById("app").style.display="block";
}

function login(){
  username = document.getElementById("user").value;
  localStorage.setItem('user', username);
  document.getElementById("app").style.display="block";
}

function format(type){
  let txt = isi.value;
  isi.value += type==="b" ? " **tebal** " : " *miring* ";
}

function tambah(){
  let j = judul.value;
  let i = isi.value;
  let file = gambar.files[0];

  if(!j || !i){
    alert("Isi dulu ya 😆");
    return;
  }

  if(file){
    let reader = new FileReader();
    reader.onload = e => simpan(j,i,e.target.result);
    reader.readAsDataURL(file);
  }else{
    simpan(j,i,null);
  }
}

function simpan(j,i,img){
  posts.push({j,i,img,like:0,fav:false,user:username});
  localStorage.setItem('storyhaze', JSON.stringify(posts));
  tampil();
}

function like(i){
  posts[i].like++;
  localStorage.setItem('storyhaze', JSON.stringify(posts));
  tampil();
}

function fav(i){
  posts[i].fav = !posts[i].fav;
  localStorage.setItem('storyhaze', JSON.stringify(posts));
  tampil();
}

function tampil(){
  let el = postsDiv = document.getElementById("posts");
  let key = search.value.toLowerCase();
  el.innerHTML="";

  posts.slice().reverse().forEach((p,i)=>{
    if(p.j.toLowerCase().includes(key) || p.i.toLowerCase().includes(key)){
      el.innerHTML += `
      <div class="card">
        <h3>${p.j}</h3>
        <p>${p.i}</p>
        <small>by ${p.user}</small>

        ${p.img ? `<img src="${p.img}">` : ""}

        <div>❤️ ${p.like} ${p.fav?"⭐":""}</div>

        <button onclick="like(${posts.length-1-i})">Like</button>
        <button onclick="fav(${posts.length-1-i})">Favorit</button>
      </div>`;
    }
  });
}

tampil();

</script>

</body>
</html>
